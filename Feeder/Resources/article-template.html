<!DOCTYPE html>
<html dir="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>[[style]]</style>
</head>
<body>
  <article>
    <header>
      <time class="date">[[date]]</time>

    <div class="content">[[body]]</div>
  </article>

</html>
